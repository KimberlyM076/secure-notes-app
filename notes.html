<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lotus Notes</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<header>
    <div class="logo-container">
      <img src="images/LotusNotes.png" alt="Lotus Notes Logo" class="logo" />
    </div>

    <nav class="nav-links">
      <ul>
        <li><a href="login.html">Home</a></li>
        <li><a href="notes.html">Notes</a></li>
      </ul>
    </nav>
  </header>

<main class="page">
  <section class="notes-card">
  
<!-- Search bar -->
    <input type="text" id="searchInput" placeholder="Search notes..." />

  <!-- Note Creation Form -->
      <div class="note-editor">
        <input id="noteTitle" type="text" placeholder="Note title" required />
        <textarea id="noteContent" placeholder="Write your note..." required></textarea>
        <button id="saveNoteBtn" type="button">Save Note</button>
      </div>  

  <!-- Notes Display Area -->
      <div id="notesContainer" class="notes-container"></div>

  <!-- Logout Button -->
      <button id="logoutBtn" class="logout-btn" type="button">Logout</button>

  </section>
</main>

<script type="module" src="js/notes.js"></script>

</body>
</html>
