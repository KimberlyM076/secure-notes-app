<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lotus Notes</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<div class="logo-container">
<img src="images/LotusNotes.png" alt="Lotus Notes Logo" class="logo">
</div>

<nav class="nav-links">
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="notes.html">Notes</a></li>

</ul>
</nav>

</header>


<main class="page">
<section class="login-card">
 
  <!-- SIGNUP SECTION -->
<div id="signup-section">
<h1>Create your password</h1>
<p class="subtitle">Set a password to protect your notes.</p>
 
    <input type="password" id="signupPassword" placeholder="Create password">
<input type="password" id="confirmPassword" placeholder="Confirm password">
<button id="createAccountBtn" type="button">Create Account</button>
<p id="signupMessage"></p>
</div>
 
  <!-- LOGIN SECTION -->
<div id="login-section">
<h1>Login</h1>
 
    <input type="password" id="loginPassword" placeholder="Enter password">
<button id="loginBtn" type="button">Login</button>
<p class="switch-link">Already have an account? <a href="#login-section">Login</a></p>
<p id="loginMessage"></p>
</div>
 
</section>

</main>

<script src="js/auth.js"></script>
</body>

</html>
