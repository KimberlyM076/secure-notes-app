<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lotus Notes</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<div class="logo-container">
<img src="images/LotusNotes.png" alt="Lotus Notes Logo" class="logo">
</div>

<nav class="nav-links">
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="notes.html">Notes</a></li>
<li><a href="signup.html">Sign Up</a></li>
</ul>
</nav>

</header>


<main class="page">
<section class="signup-card">

<h1>Create your password</h1>

<p class="subtitle">Set a password to protect your notes.</p>

<div id="signup-section">
  <input type="password" id="signupPassword" placeholder="Create password" autocomplete="new-password"/>
  <input type="password" id="confirmPassword" placeholder="Confirm password" autocomplete="new-password"/>
  <button id="createAccountBtn">Create Account</button>
</div>

<p>Already have a password? <a href="#" id="showLogin">Go to login</a></p>
</section>

</main>

<script src="js/signup.js"></script>
</body>

</html>
